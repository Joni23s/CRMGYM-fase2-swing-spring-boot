#Conexion mysql
spring.application.name=CRMGYM-fase2-swing-spring-boot
spring.datasource.url=jdbc:mysql://localhost:3306/crmgym_fase2?createDatabaseIfNotExist=true
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Validar esquema de base de datos con las entidades
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuración de Flyway para inicialización y versionado
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
