# Configuración de base de datos en memoria para pruebas unitarias (CI/CD)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creará las tablas automáticamente a partir de las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Deshabilitar Flyway durante las pruebas para evitar incompatibilidades de dialecto SQL
spring.flyway.enabled=false
