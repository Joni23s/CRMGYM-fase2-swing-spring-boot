name: Java CI con Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Usamos xvfb-run (X Virtual Framebuffer) para emular una pantalla gráfica
    # ya que al inicializar los componentes Swing en el Runner sin interfaz gráfica
    # se podría lanzar una excepción java.awt.HeadlessException.
    - name: Compilar y Probar con Maven
      run: xvfb-run mvn -B clean package
